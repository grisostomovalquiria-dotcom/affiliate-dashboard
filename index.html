<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #2563eb; --accent-light: #eff6ff; --accent-border: #bfdbfe;
    --success: #16a34a; --success-light: #f0fdf4; --success-border: #bbf7d0;
    --warn: #d97706; --warn-light: #fffbeb; --warn-border: #fde68a;
    --danger: #dc2626;
    --text-1: #111827; --text-2: #6b7280; --text-3: #9ca3af;
    --border: #e5e7eb; --bg: #f3f4f6; --white: #ffffff;
    --radius: 10px; --radius-sm: 7px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-1); min-height: 100vh; font-size: 14px; }

  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 15px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 15px; height: 15px; fill: white; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--success); background: var(--success-light); border: 1px solid var(--success-border); padding: 3px 10px; border-radius: 20px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .last-up { font-size: 11px; color: var(--text-3); }
  .refresh-btn { display: flex; align-items: center; gap: 5px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-2); padding: 5px 12px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinning { animation: spin 0.7s linear infinite; }

  main { padding: 20px 28px; max-width: 1300px; margin: 0 auto; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .metric-label { font-size: 10px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
  .metric-value { font-size: 26px; font-weight: 600; color: var(--text-1); line-height: 1; }
  .metric-value.blue { color: var(--accent); }
  .metric-value.green { color: var(--success); }
  .metric-value.amber { color: var(--warn); }
  .metric-sub { margin-top: 4px; font-size: 10px; color: var(--text-3); }

  .filter-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px; }
  .filter-label { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 7px; }
  .filter-row { display: flex; gap: 8px; align-items: center; }
  .filter-input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 13px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-1); outline: none; transition: border-color 0.2s; }
  .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  .filter-input::placeholder { color: var(--text-3); }
  .filter-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .filter-btn:hover { background: #1d4ed8; }
  .clear-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 13px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-2); cursor: pointer; }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }
  .filter-hint { font-size: 11px; color: var(--text-3); margin-top: 5px; }

  .filter-results { margin-bottom: 16px; }
  .filter-results-header { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 8px; }
  .trader-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
  .trader-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .trader-card.has-ftd { border-color: var(--success-border); background: var(--success-light); }
  .trader-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); border: 1.5px solid var(--accent-border); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; color: var(--accent); flex-shrink: 0; }
  .trader-avatar.ftd { background: var(--success-light); border-color: var(--success-border); color: var(--success); }
  .trader-info { flex: 1; min-width: 0; }
  .trader-id { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .trader-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .tag { display: inline-flex; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
  .tag-reg { background: var(--accent-light); color: var(--accent); }
  .tag-ftd { background: var(--success-light); color: var(--success); border: 1px solid var(--success-border); }
  .tag-dep { background: var(--warn-light); color: var(--warn); border: 1px solid var(--warn-border); }
  .tag-none { background: #f3f4f6; color: var(--text-3); }
  .trader-amount { font-size: 13px; font-weight: 600; color: var(--success); white-space: nowrap; }
  .trader-amount.zero { color: var(--text-3); font-weight: 400; font-size: 12px; }

  /* TABLE */
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .table-title { font-size: 13px; font-weight: 600; }
  .table-meta { font-size: 11px; color: var(--text-3); }
  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 700px; }

  thead tr.group-row th {
    padding: 8px 14px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.07em;
    border-bottom: none; text-align: center;
    border-right: 1px solid var(--border);
  }
  thead tr.group-row th:last-child { border-right: none; }
  thead tr.group-row th.g-empty { background: var(--white); border-right: 1px solid var(--border); }
  thead tr.group-row th.g-trafego { background: #eff6ff; color: var(--accent); }
  thead tr.group-row th.g-inscricoes { background: #f0fdf4; color: var(--success); }
  thead tr.group-row th.g-ftd { background: #fffbeb; color: var(--warn); }
  thead tr.group-row th.g-depositos { background: #fff7ed; color: #ea580c; }
  thead tr.group-row th.g-conv { background: #f0fdf4; color: var(--success); }

  thead tr.sub-row th {
    padding: 8px 14px; font-size: 11px; font-weight: 500; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 2px solid var(--border); border-top: 1px solid var(--border);
    background: #fafafa; white-space: nowrap;
  }
  thead tr.sub-row th.r { text-align: right; }
  thead tr.sub-row th.c { text-align: center; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f9fafb; }
  tbody tr.total-row { background: #f9fafb; font-weight: 600; border-bottom: 2px solid var(--border); }

  td { padding: 11px 14px; font-size: 13px; color: var(--text-1); border-right: 1px solid rgba(0,0,0,0.04); vertical-align: middle; }
  td:last-child { border-right: none; }
  td.r { text-align: right; }
  td.c { text-align: center; }
  td.date-cell { font-size: 12px; color: var(--text-2); font-weight: 500; white-space: nowrap; }
  td.total-label { font-weight: 600; }

  .n-blue { color: var(--accent); font-weight: 500; }
  .n-green { color: var(--success); font-weight: 500; }
  .n-amber { color: var(--warn); font-weight: 500; }
  .n-gray { color: var(--text-3); }
  .pct { font-size: 12px; color: var(--text-2); }
  .dash { color: var(--text-3); }
  .no-row td { text-align: center; color: var(--text-3); padding: 48px; border: none; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 48px; gap: 10px; color: var(--text-3); font-size: 13px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--text-1); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 12px; color: white; animation: toastIn 0.2s ease, toastOut 0.2s ease 2.8s forwards; min-width: 200px; }
  @keyframes toastIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { to{opacity:0} }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 16 16"><path d="M8 1L14 5V11L8 15L2 11V5L8 1Z"/></svg></div>
    Affiliate Dashboard
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Ao vivo</div>
    <button class="refresh-btn" onclick="fetchData(true)" id="refreshBtn">
      <svg id="refreshIcon" viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Atualizar
    </button>
    <div class="last-up" id="lastUpdate">—</div>
  </div>
</header>

<main>
  <div class="metrics">
    <div class="metric-card"><div class="metric-label">Visitantes</div><div class="metric-value blue" id="mVisit">—</div><div class="metric-sub">cliques únicos</div></div>
    <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value" id="mReg">—</div><div class="metric-sub">cadastros</div></div>
    <div class="metric-card"><div class="metric-label">FTDs</div><div class="metric-value green" id="mFtd">—</div><div class="metric-sub">1º depósito</div></div>
    <div class="metric-card"><div class="metric-label">Depósitos</div><div class="metric-value amber" id="mDep">—</div><div class="metric-sub">total</div></div>
    <div class="metric-card"><div class="metric-label">Conv. Reg.</div><div class="metric-value" id="mConvReg">—</div><div class="metric-sub">visita → cadastro</div></div>
    <div class="metric-card"><div class="metric-label">Conv. FTD</div><div class="metric-value" id="mConvFtd">—</div><div class="metric-sub">cadastro → FTD</div></div>
  </div>

  <div class="filter-card">
    <div class="filter-label">Trader</div>
    <div class="filter-row">
      <input type="text" class="filter-input" id="traderInput" placeholder="1 ID ou vários: 000000, 111111" onkeydown="if(event.key==='Enter')applyFilter()">
      <button class="filter-btn" onclick="applyFilter()">Aplicar filtros</button>
      <button class="clear-btn" onclick="clearFilter()">Limpar</button>
    </div>
    <div class="filter-hint">Separe múltiplos IDs por vírgula</div>
  </div>

  <div class="filter-results" id="filterResults" style="display:none;"></div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Resultado por dia</span>
      <span class="table-meta" id="tableMeta"></span>
    </div>
    <div class="table-wrap">
      <div id="tableArea">
        <div class="loading"><div class="spinner"></div>Conectando ao servidor...</div>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbz2R2o4CbpUAIbgzdjhTjdDJtYJqyL5BwMX3V2_KsLZZGTYYWJHXQEkDEt2TTywQmE/exec';
let raw = [], byDate = {}, byAff = {};

function getNow() {
  return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// Converte qualquer formato de data para YYYY-MM-DD
function parseDate(str) {
  if (!str) return '—';
  try {
    // "Wed Apr 29 2026 17:50:42 GMT..." ou qualquer string de data
    const d = new Date(str);
    if (!isNaN(d.getTime())) {
      const y  = d.getFullYear();
      const m  = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return y+'-'+m+'-'+dd;
    }
    // fallback: pega só a parte da data se vier dd/mm/yyyy
    if (str.includes('/')) {
      const p = str.split(' ')[0].split('/');
      if (p.length===3) return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
    }
    return str.slice(0,10);
  } catch(e) { return '—'; }
}

// Converte YYYY-MM-DD → DD-MM-YYYY para exibição
function fmtDate(d) {
  const p = d.split('-');
  return p.length===3 ? p[2]+'-'+p[1]+'-'+p[0] : d;
}

async function fetchData(manual=false) {
  const icon = document.getElementById('refreshIcon');
  const btn  = document.getElementById('refreshBtn');
  icon.classList.add('spinning');
  btn.disabled = true;
  try {
    const res  = await fetch(GAS + '?action=read&t=' + Date.now());
    const rows = await res.json();
    raw    = rows;
    byDate = {};
    byAff  = {};

    rows.forEach(r => {
      const date   = parseDate(r[0]);
      const evt    = (r[1] || 'visit').toLowerCase().trim();
      const aff    = ((r[2] || '') + '').trim();
      const amount = parseFloat(r[3]) || 0;

      // ignora linhas sem afiliado válido (dados antigos com macro não substituída)
      if (!aff || aff === '{affiliate_id}' || aff === '{trader_id}') return;

      if (!byDate[date]) byDate[date] = {visit:0,register:0,ftd:0,deposit:0,ftdAmount:0,depAmount:0};
      if (!byAff[aff])   byAff[aff]  = {visit:0,register:0,ftd:0,deposit:0,totalAmount:0};

      const map = {visit:'visit',register:'register',confirm:'register',ftd:'ftd',deposit:'deposit',redeposit:'deposit'};
      const key = map[evt] || 'visit';

      byDate[date][key]++;
      byAff[aff][key]++;
      if (key==='ftd')     byDate[date].ftdAmount += amount;
      if (key==='deposit') byDate[date].depAmount += amount;
      if (amount)          byAff[aff].totalAmount += amount;
    });

    document.getElementById('lastUpdate').textContent = 'Atualizado ' + getNow();
    renderMetrics();
    renderTable();
    if (manual) toast('Atualizado · ' + rows.length + ' eventos');
  } catch(e) {
    document.getElementById('tableArea').innerHTML = `
      <div class="loading" style="flex-direction:column;gap:8px;color:#dc2626;">
        <span style="font-size:20px;">⚠</span><span>Erro ao conectar com o servidor.</span>
      </div>`;
  } finally {
    icon.classList.remove('spinning');
    btn.disabled = false;
  }
}

function renderMetrics() {
  let tV=0,tR=0,tF=0,tD=0;
  Object.values(byDate).forEach(d=>{ tV+=d.visit; tR+=d.register; tF+=d.ftd; tD+=d.deposit; });
  document.getElementById('mVisit').textContent   = tV.toLocaleString('pt-BR');
  document.getElementById('mReg').textContent     = tR.toLocaleString('pt-BR');
  document.getElementById('mFtd').textContent     = tF.toLocaleString('pt-BR');
  document.getElementById('mDep').textContent     = tD.toLocaleString('pt-BR');
  document.getElementById('mConvReg').textContent = tV ? ((tR/tV)*100).toFixed(1)+'%' : '0%';
  document.getElementById('mConvFtd').textContent = tR ? ((tF/tR)*100).toFixed(1)+'%' : '0%';
}

function renderTable() {
  const dates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  document.getElementById('tableMeta').textContent = dates.length + ' dias · ' + raw.length + ' eventos';

  if (!dates.length) {
    document.getElementById('tableArea').innerHTML = `
      <table><tbody><tr class="no-row"><td colspan="9">Nenhum evento recebido ainda.</td></tr></tbody></table>`;
    return;
  }

  let totV=0,totR=0,totF=0,totD=0,totFA=0,totDA=0;
  dates.forEach(d=>{ const r=byDate[d]; totV+=r.visit; totR+=r.register; totF+=r.ftd; totD+=r.deposit; totFA+=r.ftdAmount; totDA+=r.depAmount; });

  const crTot = totV ? ((totR/totV)*100).toFixed(0)+'%' : '—';
  const cfTot = totR ? ((totF/totR)*100).toFixed(0)+'%' : '—';
  const fmtR  = v => v > 0 ? 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2}) : '<span class="dash">—</span>';

  const dataRows = dates.map(d => {
    const r  = byDate[d];
    const cr = r.visit    ? ((r.register/r.visit)*100).toFixed(0)+'%'   : '<span class="dash">—</span>';
    const cf = r.register ? ((r.ftd/r.register)*100).toFixed(0)+'%'     : '<span class="dash">—</span>';
    const v  = n => n > 0 ? n : '<span class="dash">—</span>';
    return `<tr>
      <td class="date-cell">${fmtDate(d)}</td>
      <td class="r"><span class="n-blue">${v(r.visit)}</span></td>
      <td class="r">${v(r.register)}</td>
      <td class="c"><span class="pct">${cr}</span></td>
      <td class="r"><span class="n-green">${v(r.ftd)}</span></td>
      <td class="r" style="font-size:12px;">${fmtR(r.ftdAmount)}</td>
      <td class="r">${v(r.deposit)}</td>
      <td class="r" style="font-size:12px;">${fmtR(r.depAmount)}</td>
      <td class="c"><span class="pct">${cf}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('tableArea').innerHTML = `
  <table>
    <thead>
      <tr class="group-row">
        <th class="g-empty"></th>
        <th class="g-trafego" colspan="1">Tráfego</th>
        <th class="g-inscricoes" colspan="2">Inscrições</th>
        <th class="g-ftd" colspan="2">FTD</th>
        <th class="g-depositos" colspan="2">Depósitos</th>
        <th class="g-conv" colspan="1">Conv.</th>
      </tr>
      <tr class="sub-row">
        <th>Dia</th>
        <th class="r">Visitantes</th>
        <th class="r">Regs</th>
        <th class="c">CR</th>
        <th class="r">Qtd</th>
        <th class="r">Valor</th>
        <th class="r">Qtd</th>
        <th class="r">Valor</th>
        <th class="c">FTD %</th>
      </tr>
    </thead>
    <tbody>
      <tr class="total-row">
        <td class="total-label">Total</td>
        <td class="r n-blue">${totV.toLocaleString('pt-BR')}</td>
        <td class="r">${totR.toLocaleString('pt-BR')}</td>
        <td class="c pct">${crTot}</td>
        <td class="r n-green">${totF.toLocaleString('pt-BR')}</td>
        <td class="r" style="font-size:12px;">${fmtR(totFA)}</td>
        <td class="r">${totD.toLocaleString('pt-BR')}</td>
        <td class="r" style="font-size:12px;">${fmtR(totDA)}</td>
        <td class="c pct">${cfTot}</td>
      </tr>
      ${dataRows}
    </tbody>
  </table>`;
}

function applyFilter() {
  const raw_input = document.getElementById('traderInput').value.trim();
  if (!raw_input) { clearFilter(); return; }
  const ids = raw_input.split(',').map(s=>s.trim()).filter(Boolean);
  const el  = document.getElementById('filterResults');

  const cards = ids.map(id => {
    const key = Object.keys(byAff).find(k=>k.toLowerCase()===id.toLowerCase());
    const aff = key ? byAff[key] : null;
    const ini = id.replace(/[^A-Z0-9]/gi,'').slice(0,2).toUpperCase()||'TR';

    if (!aff) return `<div class="trader-card">
      <div class="trader-avatar" style="background:#f3f4f6;border-color:#e5e7eb;color:var(--text-3);">${ini}</div>
      <div class="trader-info"><div class="trader-id">${id}</div>
      <div class="trader-tags"><span class="tag tag-none">Não encontrado</span></div></div>
    </div>`;

    let tags = '';
    if (aff.register>0) tags += `<span class="tag tag-reg">✓ Cadastro</span>`;
    if (aff.ftd>0)      tags += `<span class="tag tag-ftd">✓ FTD</span>`;
    if (aff.deposit>0)  tags += `<span class="tag tag-dep">✓ Redeposit</span>`;
    if (!tags)          tags  = `<span class="tag tag-none">Sem eventos</span>`;

    const amt = aff.totalAmount > 0
      ? `<div class="trader-amount">R$ ${aff.totalAmount.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`
      : `<div class="trader-amount zero">Sem depósito</div>`;

    return `<div class="${aff.ftd>0?'trader-card has-ftd':'trader-card'}">
      <div class="${aff.ftd>0?'trader-avatar ftd':'trader-avatar'}">${ini}</div>
      <div class="trader-info"><div class="trader-id">${key}</div>
      <div class="trader-tags">${tags}</div></div>
      ${amt}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="filter-results-header">Resultado para ${ids.length} trader${ids.length>1?'s':''}</div>
    <div class="trader-cards">${cards}</div>`;
  el.style.display = 'block';
}

function clearFilter() {
  document.getElementById('traderInput').value = '';
  document.getElementById('filterResults').style.display = 'none';
}

function toast(msg) {
  const c=document.getElementById('toastContainer');
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

fetchData();
setInterval(()=>fetchData(),30000);
</script>
